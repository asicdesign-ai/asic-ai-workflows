      "id": "SVA-001",
      "title": "reset clears the timer outputs",
      "objective_ids": [
        "OBJ-001"
      ],
      "class": "reset",
      "source": "both",
      "bind_target": "timer_counter",
      "description": "Reset clears count_value and irq to their idle values."
    },
    {
      "id": "SVA-002",
      "title": "terminal-count match raises the interrupt",
      "objective_ids": [
