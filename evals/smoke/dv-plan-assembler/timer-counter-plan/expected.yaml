        "justification": "The bench must drive enable, load, clear, and terminal-count controls."
      }
    ],
    "monitors": [
      {
        "name": "timer_status_monitor",
        "interface": "timer_outputs",
        "justification": "count_value and irq are the visible correctness signals."
      }
    ],
    "scoreboards": [
      {
        "name": "timer_count_scoreboard",
        "compares": "Expected counter evolution and interrupt timing against observed outputs.",
        "justification": "The timer output sequence depends on the programmed controls and count progression."
      }
    ],
    "reference_models": [
      {
        "name": "timer_reference_model",
        "scope": "Golden counter and sticky interrupt model for load, run, and clear behavior."
      }
    ],
    "virtual_sequences": [
      {
        "name": "reset_load_run_irq_vseq",
        "objective_ids": [
          "OBJ-001",
          "OBJ-002",
          "OBJ-003",
          "OBJ-004"
        ],
        "description": "Coordinates reset, configuration, free-running count, and interrupt clear behavior."
      }
    ]
  },
  "tests": [
    {
      "id": "TEST-001",
      "title": "timer reset behavior",
      "objective_ids": [
        "OBJ-001"
      ],
      "stimulus": "directed",
      "checkers": [
        "timer_status_monitor"
      ],
      "priority": "must",
      "description": "Apply reset and verify the block returns to zero count, low irq, and disabled operation."
    },
    {
      "id": "TEST-002",
      "title": "software load updates the visible counter",
      "objective_ids": [
        "OBJ-002"
      ],
      "stimulus": "directed",
      "checkers": [
        "timer_count_scoreboard"
      ],
      "priority": "must",
      "description": "Program cfg_data with cfg_load and verify count_value reflects the loaded state."
    },
    {
      "id": "TEST-003",
      "title": "enabled timer increments toward terminal count",
      "objective_ids": [
        "OBJ-003"
      ],
      "stimulus": "constrained_random",
      "checkers": [
        "timer_count_scoreboard"
      ],
      "priority": "must",
      "description": "Run the timer under varying terminal-count values and verify monotonic count progress."
    },
    {
      "id": "TEST-004",
      "title": "interrupt remains sticky until software clears it",
      "objective_ids": [
        "OBJ-004"
      ],
      "stimulus": "virtual_sequence",
      "checkers": [
        "timer_count_scoreboard"
      ],
      "priority": "must",
      "description": "Drive the timer to terminal count, observe irq assertion, and verify clear_irq deasserts it."
    }
  ],
  "assertions": [
